# =============================================================================
# SimplyConvertFile — Build .deb, create GitHub Release & publish APT repository
# =============================================================================
# Triggered when a version tag (v*) is pushed.
#
# Required GitHub Secrets:
#   GPG_PRIVATE_KEY  — ASCII-armored GPG private key for signing the APT repo
#   GPG_PASSPHRASE   — Passphrase for the GPG private key
#
# Required GitHub Pages:
#   Enable Pages on the `gh-pages` branch (root).
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-deb:
    name: Build .deb Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Build .deb package
        run: bash packaging/build-deb.sh "${{ steps.version.outputs.VERSION }}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package-${{ steps.sha.outputs.short_sha }}
          path: dist/*.deb

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip python3-gi gir1.2-gtk-3.0 libnotify-bin
          mkdir -p ~/tools
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O ~/tools/linuxdeploy-x86_64.AppImage
          chmod +x ~/tools/linuxdeploy-x86_64.AppImage

      - name: Build AppImage
        run: |
          rm -rf AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/lib/python3/dist-packages AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/48x48/apps
          pip install --target=AppDir/usr/lib/python3/dist-packages --no-deps .
          cat > AppDir/AppRun << 'EOF'
          #!/usr/bin/env python3
          import sys
          import os
          appdir = os.path.dirname(os.path.realpath(__file__))
          sys.path.insert(0, os.path.join(appdir, 'usr', 'lib', 'python3', 'dist-packages'))
          from simplyconvertfile.main import main
          main()
          EOF
          chmod +x AppDir/AppRun
          cp packaging/simplyconvertfile.desktop AppDir/usr/share/applications/
          cp src/simplyconvertfile/resources/icon.png AppDir/usr/share/icons/hicolor/48x48/apps/simplyconvertfile.png
          ARCH=x86_64 ~/tools/linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/simplyconvertfile.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/48x48/apps/simplyconvertfile.png \
            --output appimage
          mkdir -p dist
          mv Simply_Convert_File-x86_64.AppImage dist/simplyconvertfile_${{ steps.version.outputs.VERSION }}_x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-package-${{ steps.sha.outputs.short_sha }}
          path: dist/*.AppImage

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y gettext ruby-dev build-essential
          sudo gem install fpm

      - name: Build RPM package
        run: bash packaging/build-rpm.sh "${{ steps.version.outputs.VERSION }}"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package-${{ steps.sha.outputs.short_sha }}
          path: dist/*.rpm

  publish-apt:
    name: Publish APT Repository
    needs: build-deb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Download .deb Artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package-${{ steps.sha.outputs.short_sha }}
          path: artifacts/deb/

      - name: Install reprepro and gnupg
        run: sudo apt-get update && sudo apt-get install -y reprepro gnupg

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          # Mark the imported key as ultimately trusted
          KEY_FP=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/ { print $10; exit }')
          echo "${KEY_FP}:6:" | gpg --import-ownertrust

      - name: Configure GPG agent for non-interactive signing
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent

      - name: Cache passphrase in GPG agent
        run: |
          KEY_GRIP=$(gpg --list-secret-keys --with-keygrip --with-colons \
            | awk -F: '/^grp/ { print $10; exit }')
          GPG_PRESET="$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase"
          echo "${{ secrets.GPG_PASSPHRASE }}" \
            | "$GPG_PRESET" --passphrase-fd 0 --preset "$KEY_GRIP"

      - name: Checkout gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add gh-pages origin/gh-pages

      - name: Copy reprepro conf (first-time bootstrap)
        run: |
          mkdir -p gh-pages/conf
          # Only copy if conf/distributions doesn't exist yet — preserves existing DB
          if [ ! -f gh-pages/conf/distributions ]; then
            cp packaging/apt/conf/distributions gh-pages/conf/distributions
          fi

      - name: Export GPG public key
        run: |
          gpg --armor --export > gh-pages/gpg.key

      - name: Add .deb to APT repository
        run: |
          DEB=$(ls artifacts/deb/*.deb | head -n1)
          reprepro --basedir gh-pages includedeb stable "$DEB"

      - name: Commit and push gh-pages
        run: |
          cd gh-pages
          git add pool/ dists/ conf/ gpg.key
          git diff --cached --quiet || git commit -m "APT: add $(ls ../artifacts/deb/*.deb | xargs basename) [skip ci]"
          git push origin HEAD:gh-pages

  create-release:
    name: Create GitHub Release
    needs: [build-deb, build-appimage, build-rpm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Download .deb Artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-package-${{ steps.sha.outputs.short_sha }}
          path: artifacts/deb/

      - name: Download AppImage Artifacts
        uses: actions/download-artifact@v4
        with:
          name: appimage-package-${{ steps.sha.outputs.short_sha }}
          path: artifacts/appimage/

      - name: Download RPM Artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpm-package-${{ steps.sha.outputs.short_sha }}
          path: artifacts/rpm/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/deb/*.deb
            artifacts/appimage/*.AppImage
            artifacts/rpm/*.rpm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}